body:
  text: 失譯人名今附東晉録如是我聞一時佛在阿耨達多龍王宮中與諸比丘五百人俱菩薩摩訶薩滿足一千盡是一生補處皆得陀羅尼位階十地猶如王子不久當得紹繼王位此諸菩薩亦復如是有大功德而自莊嚴不久當得灌頂之位得成作佛此諸菩薩各從他方諸佛世界而來集會於諸佛所心無疑滯時會衆中有一菩薩名曰師子奮迅從座而起偏袒右肩右膝著地合掌向佛而白佛言世尊若有善男子善女人盡其形壽一切樂具供養如來得福多不佛告師子奮迅菩薩莫作是說心生疑惑供養如來得福甚多何以故如來有無量戒德無量禪定三昧無量智慧無量解脫無量解脫知見并諸聲聞緣覺辟支佛及一切賢聖其福甚多不可限量爾時師子奮迅菩薩聞佛所說心生信解倍加恭敬供養尊重讚歎即以衣服房舍臥具病瘦湯藥如是種種一切樂具皆悉供養令無所乏若有善男子善女人於如來滅度之後取佛舍利如芥子許供養禮拜比前功德其福正等若復有人持以七寶如須彌山等於一劫中布施聲聞辟支佛得福多不不也世尊佛言若有出家在家之人能持一錢以用布施初發菩提心人得福德比前功德百分千分百千萬分不及其一乃至算數譬喻所不能及如是如是如佛所說若復有人於如來滅度之後行於曠路見於如來塔廟若善男女能於一華若一燈燭若一團泥用塗像前以用供養若有善男子善女人持一銅錢施於佛像為補治故若以一掬水用灑佛塔地除去不淨乾花燭燼若燒香供養舉足一步詣於塔寺若一稱南無佛欲使此人墮三惡道百千萬劫終無是處佛告師子奮迅菩薩有陀羅尼名曰花聚多所饒益諸天世人有能受持讀誦通利如法修行所得福德倍過於上復有善男子供養聲聞緣覺辟支佛菩薩百千萬倍不及其一乃至算數譬喻所不能知是人命終終不生於八難之處卑賤之家在所生處六情完具自識宿命常值三寶見佛聞法終不忘失菩提之心能得甚深無量辨才乘六神通遊至十方諸佛世界咨受妙法教化衆生爾時世尊即說呪曰多狄他度羅尼陀羅尼陀羅尼磨禰波步婆散尼悉題旃題涅目脂涅呵梨慮伽鉢帝佛陀鉢帝帝梨烏迦囉𫪦佉伽羅𫪦囉殊波伽帝帝闍和帝毗舍羅佛題曇摩波嘶阿叉夜羯卑羯波和帝阿彌多羯卑休多舍尼帝闍啝帝泥句婆摩一唏帝帝闍伽呵和帝因題夜佛題嘻拏佛提莎訶佛言有善男子善女人欲行此陀羅尼者若二月三月若八月中從白月八日至十五日淨自澡浴著新淨衣當於靜處坐佛形像懸繒幡蓋花香供養禮拜懺悔晝夜六時誦此陀羅尼若坐若行莫令心亂滿七日已當得見佛若不見者復更二七三七日專心誦此陀羅尼必得見佛坐蓮華上而為說法是時即得自識宿命念力堅固得陀羅尼無礙辨才若求多聞若求禪定若求智慧若求辨才若求醫方若求呪術若求工巧若求文藝如是種種隨心所願悉皆得之乃至成佛終不忘失除其四諦爾時師子奮迅菩薩諸天人民及阿修羅諸比丘衆聞佛所說歡喜奉行
